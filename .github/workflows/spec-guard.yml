name: Spec Guard

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  pull_request_target:
    types: [opened, synchronize, reopened, labeled]

jobs:
  spec-guard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout spec-first action
        uses: actions/checkout@v4

      - name: Run Spec Guard
        uses: ./.spec-first
        with:
          model: ${{ vars.SPEC_GUARD_MODEL }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
