name: Spec Guard

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

jobs:
  spec-guard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Run Spec Guard
        uses: jefer94/spec-first@v1
        with:
          model: ${{ vars.SPEC_GUARD_MODEL }}
          bypass_roles: ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
